function App() {
  const [activeTab, setActiveTab] = useState('brew');
  const [beans, setBeans] = useState([]);
  const [brews, setBrews] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [selectedBeanId, setSelectedBeanId] = useState(null);
  const [brewDraft, setBrewDraft] = useState(emptyBrew(null, 'lm-14'));
  const [lastSavedBrew, setLastSavedBrew] = useState(null);
  const [suggestionContext, setSuggestionContext] = useState(null);
  const [selectedBrewDetail, setSelectedBrewDetail] = useState(null);
  const [forceAddBean, setForceAddBean] = useState(false);
  const [storageStatus, setStorageStatus] = useState({ available: null, lastLoad: null, lastSave: null, beansLoaded: 0, brewsLoaded: 0, errors: [] });

  // Load on mount
  useEffect(() => {
    (async () => {
      const { beans, brews, diag } = await loadAll();
      setBeans(beans);
      setBrews(brews);
      setStorageStatus(s => ({ ...s, available: diag.available, lastLoad: new Date().toISOString(), beansLoaded: diag.beansLoaded, brewsLoaded: diag.brewsLoaded, errors: diag.errors }));
      // Pick last-used bean as default
      if (brews.length > 0) {
        const last = [...brews].sort((a, b) => new Date(b.date) - new Date(a.date))[0];
        const stillActive = beans.find(b => b.id === last.beanId && !b.archived);
        if (stillActive) setSelectedBeanId(stillActive.id);
        else if (beans.find(b => !b.archived)) setSelectedBeanId(beans.find(b => !b.archived).id);
      } else if (beans.find(b => !b.archived)) {
        setSelectedBeanId(beans.find(b => !b.archived).id);
      }
      setLoaded(true);
    })();
  }, []);

  // Helper to update lastSave timestamp after every successful save
  const markSaved = (kind, ok, err) => {
    setStorageStatus(s => ({
      ...s,
      lastSave: ok ? new Date().toISOString() : s.lastSave,
      errors: ok ? s.errors : [...(s.errors || []), `${kind}: ${err}`].slice(-5),
    }));
  };

  // When selected bean changes, refresh draft with sticky defaults from last brew of that bean
  // Track previous selectedBeanId so we only reset the brew draft when the user
  // actually switches beans — not when the beans array is mutated (e.g. editing).
  const prevSelectedBeanIdRef = useRef(null);
  useEffect(() => {
    if (!selectedBeanId) return;
    if (prevSelectedBeanIdRef.current === selectedBeanId) return;
    prevSelectedBeanIdRef.current = selectedBeanId;
    const bean = beans.find(b => b.id === selectedBeanId);
    if (!bean) return;
    const beanBrews = brews.filter(br => br.beanId === selectedBeanId).sort((a, b) => new Date(b.date) - new Date(a.date));
    if (beanBrews.length > 0) {
      const last = beanBrews[0];
      setBrewDraft({
        ...emptyBrew(selectedBeanId, last.basket),
        beanId: selectedBeanId,
        basket: last.basket,
        doseG: last.doseG,
        tempC: last.tempC,
        grindNiche: last.grindNiche,
      });
    } else {
      // No history for this bean — use roast-level midpoint
      const target = TARGETS[bean.roastLevel];
      const tempMid = (target.temp.green[0] + target.temp.green[1]) / 2;
      setBrewDraft({
        ...emptyBrew(selectedBeanId, 'lm-14'),
        tempC: tempMid,
      });
    }
  }, [selectedBeanId, beans]);

  // Save handlers
  const handleSaveBrew = async (newBrew) => {
    const next = [...brews, newBrew];
    setBrews(next);
    const r = await saveBrews(next);
    markSaved('brews', r.ok, r.error);
  };

  const handleAddBean = async (bean) => {
    const next = [...beans, bean];
    setBeans(next);
    const r = await saveBeans(next);
    markSaved('beans', r.ok, r.error);
    if (!selectedBeanId) setSelectedBeanId(bean.id);
  };

  const handleUpdateBean = async (bean) => {
    const next = beans.map(b => b.id === bean.id ? bean : b);
    setBeans(next);
    const r = await saveBeans(next);
    markSaved('beans', r.ok, r.error);
  };

  const handleArchiveBean = async (bean) => {
    await handleUpdateBean({ ...bean, archived: true });
    if (selectedBeanId === bean.id) {
      const nextActive = beans.find(b => b.id !== bean.id && !b.archived);
      setSelectedBeanId(nextActive?.id || null);
    }
  };

  const handleUnarchiveBean = async (bean) => {
    await handleUpdateBean({ ...bean, archived: false });
  };

  const handleDeleteBean = async (bean) => {
    const nextBeans = beans.filter(b => b.id !== bean.id);
    const nextBrews = brews.filter(br => br.beanId !== bean.id);
    setBeans(nextBeans);
    setBrews(nextBrews);
    const r1 = await saveBeans(nextBeans);
    const r2 = await saveBrews(nextBrews);
    markSaved('delete-bean', r1.ok && r2.ok, r1.error || r2.error);
    if (selectedBeanId === bean.id) {
      const nextActive = nextBeans.find(b => !b.archived);
      setSelectedBeanId(nextActive?.id || null);
    }
  };

  const handleDeleteBrew = async (brew) => {
    const next = brews.filter(b => b.id !== brew.id);
    setBrews(next);
    const r = await saveBrews(next);
    markSaved('brews', r.ok, r.error);
    // Clear lastSavedBrew if the user just deleted it — prevents stale "Was nächstes?" state
    if (lastSavedBrew && lastSavedBrew.id === brew.id) {
      setLastSavedBrew(null);
    }
  };

  const handleApplySuggestion = (action) => {
    if (!lastSavedBrew) return;
    const newDraft = { ...lastSavedBrew, id: null, date: null, yieldG: '', timeS: '', rating: 0, quickTag: null, fullRating: null, channeling: false, gusher: false, choke: false, notes: '' };
    if (action.kind === 'grind') newDraft.grindNiche = +(newDraft.grindNiche + action.delta).toFixed(1);
    else if (action.kind === 'temp') newDraft.tempC = +(newDraft.tempC + action.delta).toFixed(1);
    else if (action.kind === 'ratio') {
      const oldRatio = lastSavedBrew.doseG > 0 ? lastSavedBrew.yieldG / lastSavedBrew.doseG : 2.0;
      const newRatio = oldRatio + action.delta;
      // Pre-fill yield with new target so user has a goal to pull to
      newDraft.yieldG = +(newDraft.doseG * newRatio).toFixed(1);
      newDraft.timeS = ''; // user will time the new shot
    }
    else if (action.kind === 'dose') newDraft.doseG = +(newDraft.doseG + action.delta).toFixed(1);
    setBrewDraft(newDraft);
    setSuggestionContext(null);
    setActiveTab('brew');
  };

  // Export: serialize beans + brews as JSON
  const handleExportData = () => {
    const payload = {
      version: 1,
      exportedAt: new Date().toISOString(),
      appName: 'espresso-tracker',
      beans,
      brews,
    };
    return JSON.stringify(payload, null, 2);
  };

  // Import: validate and replace state + storage
  const handleImportData = async (jsonStr) => {
    let parsed;
    try {
      parsed = JSON.parse(jsonStr);
    } catch (err) {
      throw new Error(`JSON ungültig: ${err.message}`);
    }
    if (!parsed || typeof parsed !== 'object') {
      throw new Error('Erwartet ein JSON-Objekt mit "beans" und "brews"-Arrays.');
    }
    if (!Array.isArray(parsed.beans)) {
      throw new Error('Feld "beans" fehlt oder ist kein Array.');
    }
    if (!Array.isArray(parsed.brews)) {
      throw new Error('Feld "brews" fehlt oder ist kein Array.');
    }
    // Minimal per-item validation
    for (let i = 0; i < parsed.beans.length; i++) {
      const b = parsed.beans[i];
      if (!b || typeof b !== 'object') throw new Error(`Bohne #${i + 1}: kein Objekt.`);
      if (!b.id || !b.name || !b.roaster) throw new Error(`Bohne #${i + 1}: id, name oder roaster fehlt.`);
      if (!b.roastLevel || !TARGETS[b.roastLevel]) throw new Error(`Bohne #${i + 1} "${b.name}": ungültiger roastLevel "${b.roastLevel}".`);
    }
    const beanIds = new Set(parsed.beans.map(b => b.id));
    for (let i = 0; i < parsed.brews.length; i++) {
      const b = parsed.brews[i];
      if (!b || typeof b !== 'object') throw new Error(`Brew #${i + 1}: kein Objekt.`);
      if (!b.id || !b.beanId) throw new Error(`Brew #${i + 1}: id oder beanId fehlt.`);
      if (!beanIds.has(b.beanId)) throw new Error(`Brew #${i + 1}: verweist auf nicht vorhandene Bohne "${b.beanId}".`);
    }
    // All good — replace
    setBeans(parsed.beans);
    setBrews(parsed.brews);
    const r1 = await saveBeans(parsed.beans);
    const r2 = await saveBrews(parsed.brews);
    markSaved('import', r1.ok && r2.ok, r1.error || r2.error);
    // Reset transient state
    setLastSavedBrew(null);
    setSuggestionContext(null);
    setSelectedBrewDetail(null);
    // Pick a sensible selected bean
    const firstActive = parsed.beans.find(b => !b.archived);
    setSelectedBeanId(firstActive ? firstActive.id : null);
    prevSelectedBeanIdRef.current = null; // force draft re-init
  };

  if (!loaded) {
    return (
      <div className="app-shell">
        <Styles />
        <div className="loading">Lade …</div>
      </div>
    );
  }

  return (
    <div className="app-shell">
      <Styles />
      <header className="app-header">
        <span className="app-title">Espresso Log</span>
        <span className="app-subtitle mono">Micra · Niche</span>
      </header>

      <main className="app-main">
        {activeTab === 'brew' && (
          <BrewView
            beans={beans}
            brews={brews}
            selectedBeanId={selectedBeanId}
            setSelectedBeanId={setSelectedBeanId}
            onSave={handleSaveBrew}
            onShowSuggestion={(brew, bean) => setSuggestionContext({ brew, bean })}
            lastSavedBrew={lastSavedBrew}
            setLastSavedBrew={setLastSavedBrew}
            brewDraft={brewDraft}
            setBrewDraft={setBrewDraft}
            onAddBean={() => { setActiveTab('beans'); setForceAddBean(true); }}
          />
        )}
        {activeTab === 'log' && (
          <LogView
            brews={brews}
            beans={beans}
            onSelectBrew={(b) => setSelectedBrewDetail(b)}
            onRepeat={(b) => {
              // Copy recipe values into fresh draft, switch to brew tab
              setSelectedBeanId(b.beanId);
              setBrewDraft({
                ...emptyBrew(b.beanId, b.basket),
                beanId: b.beanId,
                basket: b.basket,
                doseG: b.doseG,
                yieldG: b.yieldG,
                timeS: b.timeS,
                tempC: b.tempC,
                grindNiche: b.grindNiche,
              });
              setActiveTab('brew');
            }}
          />
        )}
        {activeTab === 'beans' && (
          <BeansView
            beans={beans}
            brews={brews}
            onAdd={handleAddBean}
            onUpdate={handleUpdateBean}
            onArchive={handleArchiveBean}
            onUnarchive={handleUnarchiveBean}
            onDelete={handleDeleteBean}
            forceAddBean={forceAddBean}
            onClearForceAddBean={() => setForceAddBean(false)}
            onExport={handleExportData}
            onImport={handleImportData}
            storageStatus={storageStatus}
          />
        )}
        {activeTab === 'stats' && (
          <StatsView beans={beans} brews={brews} />
        )}
      </main>

      <nav className="bottom-nav">
        <button className={activeTab === 'brew' ? 'active' : ''} onClick={() => setActiveTab('brew')}>Brew</button>
        <button className={activeTab === 'log' ? 'active' : ''} onClick={() => setActiveTab('log')}>Logbuch</button>
        <button className={activeTab === 'beans' ? 'active' : ''} onClick={() => setActiveTab('beans')}>Bohnen</button>
        <button className={activeTab === 'stats' ? 'active' : ''} onClick={() => setActiveTab('stats')}>Statistik</button>
      </nav>

      {suggestionContext && (
        <SuggestionModal
          brew={suggestionContext.brew}
          bean={suggestionContext.bean}
          brews={brews}
          onClose={() => setSuggestionContext(null)}
          onApply={handleApplySuggestion}
        />
      )}

      {selectedBrewDetail && (
        <BrewDetail
          brew={selectedBrewDetail}
          bean={beans.find(b => b.id === selectedBrewDetail.beanId)}
          onClose={() => setSelectedBrewDetail(null)}
          onDelete={handleDeleteBrew}
        />
      )}
    </div>
  );
}

        animation: slideUp 0.2s ease;
      }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
      .modal-header {
        padding: 16px 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        background: var(--bg);
        z-index: 1;
      }
      .modal-header h3 {
        margin: 0;
        font-family: 'Fraunces', serif;
        font-weight: 500;
        font-size: 18px;
      }
      .close-btn {
        background: none;
        border: none;
        font-size: 28px;
        line-height: 1;
        cursor: pointer;
        color: var(--text-muted);
        padding: 0 6px;
      }
      .modal-body { padding: 16px 18px; }
      .modal-actions {
        display: flex;
        gap: 8px;
        margin-top: 20px;
      }

      /* Suggestion */
      .diagnosis {
        background: var(--surface);
        border-left: 3px solid var(--accent);
        padding: 12px 14px;
        border-radius: 4px;
        margin-bottom: 12px;
        font-size: 14px;
        line-height: 1.55;
      }
      .bean-age-note {
        font-size: 13px;
        color: var(--text-muted);
        font-style: italic;
        margin-bottom: 12px;
      }
      .primary-suggestion {
        background: var(--surface);
        border: 1px solid var(--accent);
        border-radius: 8px;
        padding: 14px;
        margin-bottom: 12px;
      }
      .suggestion-label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--accent);
        font-weight: 500;
        margin-bottom: 6px;
      }
      .suggestion-text {
        font-size: 15px;
        margin-bottom: 10px;
      }
      .alternatives { margin-top: 10px; }
      .alt-item {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 8px;
      }

      /* LLM section */
      .suggestion-source {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text-muted);
        font-weight: 600;
        margin-bottom: 10px;
        padding-bottom: 4px;
        border-bottom: 1px solid var(--border);
      }
      .llm-section {
        margin-top: 24px;
        padding-top: 4px;
      }
      .llm-section-hint {
        font-size: 13px;
        color: var(--text-muted);
        margin-bottom: 12px;
        line-height: 1.4;
      }
      .llm-trigger {
        width: 100%;
      }
      .llm-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 24px 12px;
        font-size: 14px;
        color: var(--text-muted);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
      }
      .spinner {
        width: 22px;
        height: 22px;
        border: 2px solid var(--accent-soft);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .llm-error {
        padding: 12px 14px;
        background: rgba(166,73,46,0.08);
        border: 1px solid var(--red);
        border-radius: 8px;
        font-size: 13px;
        color: var(--red);
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
        max-height: 320px;
        overflow-y: auto;
      }
      .llm-reasoning {
        font-size: 14px;
        color: var(--text);
        background: var(--surface);
        border-left: 3px solid var(--text-muted);
        padding: 10px 14px;
        border-radius: 4px;
        margin-bottom: 12px;
        line-height: 1.55;
      }
      .llm-uncertainties {
        background: var(--surface);
        border: 1px dashed var(--border-strong);
        border-radius: 8px;
        padding: 10px 14px;
        margin-bottom: 12px;
      }
      .llm-uncertainties ul {
        margin: 4px 0 0 0;
        padding-left: 18px;
        font-size: 13px;
        color: var(--text);
        line-height: 1.5;
      }
      .llm-uncertainties li {
        margin-bottom: 4px;
      }
      .confidence-badge {
        display: inline-block;
        margin-left: 8px;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.04em;
        text-transform: lowercase;
        vertical-align: middle;
      }
      .confidence-high {
        background: rgba(107,142,90,0.18);
        color: var(--green);
        border: 1px solid var(--green);
      }
      .confidence-medium {
        background: rgba(201,161,74,0.18);
        color: #8C6F2B;
        border: 1px solid var(--yellow);
      }
      .confidence-low {
        background: rgba(166,73,46,0.10);
        color: var(--red);
        border: 1px solid var(--red);
      }

      /* Data Export/Import */
      .data-io-card {
        margin-top: 20px;
        border: 1px dashed var(--border-strong);
        background: transparent;
      }
      .data-io-hint {
        font-size: 13px;
        color: var(--text-muted);
        line-height: 1.5;
        margin-bottom: 12px;
      }
      .data-io-buttons {
        display: flex;
        gap: 10px;
        margin-bottom: 10px;
      }
      .data-io-stats {
        font-size: 12px;
        color: var(--text-muted);
        text-align: center;
        padding-top: 4px;
      }
      textarea.mono {
        font-family: 'IBM Plex Mono', monospace;
        line-height: 1.5;
        width: 100%;
        padding: 10px;
        border: 1px solid var(--border-strong);
        border-radius: 8px;
        background: var(--surface);
        color: var(--text);
        resize: vertical;
      }

      /* Log */
      .brew-list { margin-top: 10px; }
      .brew-row {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px 14px;
        margin-bottom: 8px;
        box-shadow: var(--shadow);
        display: flex;
        align-items: stretch;
        gap: 8px;
      }
      .brew-row-content {
        flex: 1;
        cursor: pointer;
        min-width: 0;
      }
      .brew-row-content:active { opacity: 0.7; }
      .brew-row-repeat {
        flex: 0 0 auto;
        width: 44px;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--accent);
        font-size: 22px;
        font-family: inherit;
        cursor: pointer;
        padding: 0;
        align-self: center;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .brew-row-repeat:active { background: rgba(199, 90, 44, 0.1); }
      .brew-row-top {
        display: flex;
        justify-content: space-between;
        margin-bottom: 4px;
        font-size: 14px;
      }
      .brew-bean { font-weight: 500; }
      .brew-rating { color: var(--accent); letter-spacing: 1px; font-size: 13px; }
      .brew-row-meta {
        display: flex;
        gap: 10px;
        font-size: 12px;
        color: var(--text-muted);
        flex-wrap: wrap;
      }
      .brew-tag {
        margin-top: 4px;
        font-size: 12px;
        color: var(--accent);
      }

      /* Bean list */
      .bean-row {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        margin-bottom: 8px;
        box-shadow: var(--shadow);
      }
      .bean-row.expanded { border-color: var(--accent); }
      .bean-row-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 14px;
        cursor: pointer;
      }
      .bean-row-header:active { opacity: 0.7; }
      .bean-row-main { flex: 1; min-width: 0; }
      .bean-row-edit {
        flex: 0 0 auto;
        width: 36px;
        height: 36px;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text-muted);
        font-size: 16px;
        font-family: inherit;
        cursor: pointer;
        padding: 0;
      }
      .bean-row-edit:active { background: var(--surface-2); }
      .bean-row-detail {
        padding: 0 14px 14px;
        border-top: 1px solid var(--border);
        margin-top: 4px;
        padding-top: 12px;
      }
      .best-shots-list { display: flex; flex-direction: column; gap: 4px; margin-top: 6px; }
      .best-shot {
        display: flex;
        gap: 8px;
        font-size: 12px;
        padding: 6px 8px;
        background: rgba(0,0,0,0.03);
        border-radius: 6px;
        flex-wrap: wrap;
      }
      .best-shot-rating { color: var(--accent); }

      .trend-chart-wrap { margin-top: 6px; }
      .trend-chart {
        width: 100%;
        height: auto;
        max-height: 130px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 6px;
      }
      .trend-legend {
        margin-top: 4px;
        font-size: 11px;
        color: var(--text-muted);
        line-height: 1.4;
      }

      /* Stats view */
      .stats-view { display: flex; flex-direction: column; gap: 12px; }
      .stat-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 6px;
      }
      .stat-cell {
        background: var(--surface-2);
        padding: 12px;
        border-radius: 8px;
        text-align: center;
      }
      .stat-value {
        font-size: 22px;
        font-weight: 500;
        color: var(--accent);
        font-family: 'Fraunces', serif;
      }
      .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

      .weekly-bars {
        display: flex;
        gap: 4px;
        align-items: flex-end;
        height: 80px;
        margin-top: 8px;
      }
      .weekly-bar-col {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 100%;
        gap: 4px;
      }
      .weekly-bar-fill {
        width: 100%;
        background: var(--accent);
        opacity: 0.7;
        border-radius: 3px 3px 0 0;
        min-height: 2px;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding-top: 2px;
      }
      .weekly-bar-num { color: #fff; font-size: 10px; font-family: 'IBM Plex Mono', monospace; }
      .weekly-bar-label { font-size: 9px; color: var(--text-muted); text-align: center; }

      .rating-bars, .tag-stats { margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
      .rating-bar-row { display: flex; align-items: center; gap: 8px; }
      .rating-bar-label {
        flex: 0 0 auto;
        width: 70px;
        font-size: 13px;
        color: var(--accent);
        letter-spacing: 1px;
      }
      .rating-bar-track {
        flex: 1;
        height: 14px;
        background: var(--surface-2);
        border-radius: 4px;
        overflow: hidden;
      }
      .rating-bar-fill {
        height: 100%;
        background: var(--accent);
        opacity: 0.7;
        border-radius: 4px;
        min-width: 2px;
        transition: width 0.2s;
      }
      .rating-bar-count {
        flex: 0 0 auto;
        font-size: 12px;
        color: var(--text-muted);
        min-width: 24px;
        text-align: right;
      }

      .roast-stats { display: flex; flex-direction: column; gap: 4px; margin-top: 8px; }
      .roast-stat-row {
        display: flex;
        align-items: baseline;
        gap: 8px;
        padding: 6px 0;
        border-bottom: 1px solid var(--border);
      }
      .roast-stat-row:last-child { border-bottom: none; }
      .bean-row-top {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 4px;
      }
      .bean-name { font-size: 15px; }
      .bean-roaster { font-size: 13px; }
      .bean-row-meta {
        display: flex;
        gap: 10px;
        font-size: 12px;
        color: var(--text-muted);
        flex-wrap: wrap;
      }

      /* Detail */
      .detail-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px 16px;
        margin-bottom: 16px;
      }
      .detail-grid > div {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .detail-grid > div .muted {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .detail-section {
        margin-bottom: 16px;
        padding-top: 12px;
        border-top: 1px solid var(--border);
      }
      .tag-inline {
        display: inline-block;
        padding: 3px 10px;
        background: var(--surface-2);
        border-radius: 999px;
        font-size: 12px;
        margin-right: 6px;
      }
    `}</style>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW reg failed:', err));
      });
    }
  </script>

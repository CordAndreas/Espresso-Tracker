  <!-- App code, transpiled in-browser by Babel -->
  <script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef, Fragment } = React;

// Standalone PWA version — React via CDN, no imports needed.
// Hooks are destructured from window.React in the HTML wrapper.
// const { useState, useEffect, useMemo, useRef } = React;

// =============================================================================
// CONSTANTS & TARGETS
// =============================================================================

const ROAST_LEVELS = [
  { id: 'light', label: 'hell' },
  { id: 'medium-light', label: 'mittel-hell' },
  { id: 'medium', label: 'mittel' },
  { id: 'medium-dark', label: 'mittel-dunkel' },
  { id: 'dark', label: 'dunkel' },
];

const PROCESSES = [
  { id: 'washed', label: 'washed' },
  { id: 'natural', label: 'natural' },
  { id: 'honey', label: 'honey' },
  { id: 'anaerobic', label: 'anaerobic' },
  { id: 'other', label: 'other' },
];

const BASKETS = [
  { id: 'lm-14', label: 'LM 14g', defaultDose: 14 },
  { id: 'vst-18', label: 'VST 18g', defaultDose: 18 },
  { id: 'ims-20', label: 'IMS 20g', defaultDose: 20 },
  { id: 'single', label: 'Single', defaultDose: 9 },
];

const QUICK_TAGS = [
  { id: 'sour', label: 'sauer' },
  { id: 'bitter', label: 'bitter' },
  { id: 'sour-and-bitter', label: 'sauer + bitter' },
  { id: 'flat', label: 'flach/dünn' },
  { id: 'heavy-dull', label: 'schwer/dumpf' },
  { id: 'ashy-dry', label: 'aschig/trocken' },
  { id: 'fad-boring', label: 'fad/langweilig' },
  { id: 'balanced', label: 'balanced/süß' },
];

// Legacy mapping for tags from older versions — keeps old data displayable and analyzable.
const LEGACY_TAG_MAP = {
  'over-extracted': 'bitter',
  'channeling-suspect': 'sour-and-bitter',
};

function normalizeQuickTag(tagId) {
  if (!tagId) return null;
  return LEGACY_TAG_MAP[tagId] || tagId;
}

function getQuickTagLabel(tagId) {
  const normalized = normalizeQuickTag(tagId);
  if (!normalized) return null;
  const found = QUICK_TAGS.find(t => t.id === normalized);
  return found ? found.label : tagId;
}

// Target ranges — green (target), yellow (acceptable bracket), used for visualization
// ratio = yieldG / doseG
// For visualization, full bar range and yellow bracket are wider than green target
//
// Dark/medium-dark synthesized from Gemini+ChatGPT discussion (May 2026):
// - Dark: short-ratio Italian tradition + Micra thermal stability favors 91-92°C (NOT lower)
// - Medium-dark: distinct from dark, slightly longer/warmer/wider
// - Niche Zero produces body → dark roasts benefit from ratio 1.7-2.0 (not too short, not too long)
const TARGETS = {
  'light':         { ratio: { green: [2.5, 3.0], yellow: [2.2, 3.3], full: [1.5, 4.0] }, time: { green: [30, 40], yellow: [25, 45], full: [15, 55] }, temp: { green: [94, 96], yellow: [92, 97], full: [88, 100] } },
  'medium-light':  { ratio: { green: [2.5, 3.0], yellow: [2.2, 3.3], full: [1.5, 4.0] }, time: { green: [30, 40], yellow: [25, 45], full: [15, 55] }, temp: { green: [94, 96], yellow: [92, 97], full: [88, 100] } },
  'medium':        { ratio: { green: [2.0, 2.5], yellow: [1.8, 2.8], full: [1.5, 4.0] }, time: { green: [28, 32], yellow: [24, 36], full: [15, 55] }, temp: { green: [93, 94], yellow: [91, 96], full: [88, 100] } },
  'medium-dark':   { ratio: { green: [1.9, 2.2], yellow: [1.7, 2.4], full: [1.4, 4.0] }, time: { green: [24, 30], yellow: [20, 34], full: [15, 55] }, temp: { green: [91, 93], yellow: [89, 95], full: [88, 100] } },
  'dark':          { ratio: { green: [1.7, 2.0], yellow: [1.5, 2.2], full: [1.4, 4.0] }, time: { green: [22, 28], yellow: [19, 32], full: [15, 55] }, temp: { green: [91, 92], yellow: [89, 94], full: [88, 100] } },
};

// =============================================================================
// HELPERS
// =============================================================================

const uuid = () => Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);

const daysSince = (isoDate) => {
  if (!isoDate) return null;
  const ms = Date.now() - new Date(isoDate).getTime();
  return Math.floor(ms / (1000 * 60 * 60 * 24));
};

const formatDate = (iso) => {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: '2-digit' });
};

const formatDateTime = (iso) => {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleString('de-DE', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
};

const zoneOfValue = (value, ranges) => {
  if (value == null || isNaN(value)) return 'none';
  if (value >= ranges.green[0] && value <= ranges.green[1]) return 'green';
  if (value >= ranges.yellow[0] && value <= ranges.yellow[1]) return 'yellow';
  return 'red';
};

const distanceFromGreen = (value, ranges) => {
  if (value == null || isNaN(value)) return 0;
  if (value < ranges.green[0]) return ranges.green[0] - value;
  if (value > ranges.green[1]) return value - ranges.green[1];
  return 0;
};

// =============================================================================
// SUGGESTION ENGINE
// =============================================================================

function suggestNext(brew, bean) {
  const target = TARGETS[bean.roastLevel];
  const ratio = brew.doseG > 0 ? brew.yieldG / brew.doseG : null;
  const beanAge = daysSince(bean.roastDate);
  const tag = normalizeQuickTag(brew.quickTag); // map legacy tag ids

  let beanAgeNote = null;
  if (beanAge != null) {
    if (beanAge < 5) beanAgeNote = `Bohne ${beanAge} Tage alt — entgast evtl. noch, Resultate können erratisch sein.`;
    else if (beanAge > 30) beanAgeNote = `Bohne ${beanAge} Tage alt — möglicherweise abnehmende Aromatik.`;
  }

  // Step 1: Mechanical — wins over everything else
  if (brew.channeling || tag === 'sour-and-bitter') {
    return {
      diagnosis: 'Channeling sichtbar oder durch Geschmack signalisiert (sauer und bitter zugleich) — ungleichmäßige Extraktion. Recipe-Tuning hat erst Sinn nach mechanischer Verbesserung; Geschmacks-Diagnose unzuverlässig.',
      primary: { description: 'Puck-Vorbereitung: leichtes WDT zur Distribution + gleichmäßiger Tamper-Druck. Bei Niche Zero KEIN aggressives WDT (clumpt kaum von sich aus — zu viel WDT erzeugt Mikro-Channels).', kind: 'mechanical', delta: null, target: null },
      alternatives: [
        { description: 'Mahlgrad +0.5 (etwas gröber) — falls fein-gemahlen Channeling fördert.', kind: 'grind', delta: 0.5 },
        { description: 'Sieb prüfen / Dose im sweet spot des Siebs halten.', kind: 'mechanical', delta: null },
      ],
      beanAgeNote,
    };
  }

  if (brew.gusher) {
    return {
      diagnosis: 'Gusher — Wasser läuft zu schnell durch, Schicht zu durchlässig oder ungleichmäßig.',
      primary: { description: 'Mahlgrad −1.0 (deutlich feiner)', kind: 'grind', delta: -1.0 },
      alternatives: [
        { description: 'Dose +0.5g (mehr Widerstand)', kind: 'dose', delta: 0.5 },
        { description: 'Distribution prüfen', kind: 'mechanical', delta: null },
      ],
      beanAgeNote,
    };
  }

  if (brew.choke) {
    return {
      diagnosis: 'Choke — Wasser kommt kaum durch, zu viel Widerstand im Puck.',
      primary: { description: 'Mahlgrad +1.0 (deutlich gröber)', kind: 'grind', delta: 1.0 },
      alternatives: [
        { description: 'Dose −0.5g (weniger Widerstand)', kind: 'dose', delta: -0.5 },
        { description: 'Größeres Sieb erwägen', kind: 'mechanical', delta: null },
      ],
      beanAgeNote,
    };
  }

  // Step 2: Recipe distance from green zone (used for step-size scaling below)
  const timeDist = distanceFromGreen(brew.timeS, target.time);
  const ratioDist = ratio != null ? distanceFromGreen(ratio, target.ratio) : 0;
  const tempDist = distanceFromGreen(brew.tempC, target.temp);
  const farOff = timeDist > 3 || ratioDist > 0.3 || tempDist > 2;

  // Step 3: Full-rating-driven diagnosis — takes priority over quickTag when set,
  // because the 7 sliders carry much richer signal than a single tag.
  if (brew.fullRating) {
    const fr = brew.fullRating;

    // 3a. Channeling signal: both poles strong (overrides everything else)
    if (fr.sourDefect >= 3 && fr.bitter >= 3) {
      return {
        diagnosis: 'Sauer UND bitter zugleich im Profil — klassisches Channeling-Signal (gleichzeitige Unter- und Überextraktion in verschiedenen Puck-Bereichen).',
        primary: { description: 'Distribution & Puck: leichtes WDT + gleichmäßiger Tamper-Druck (bei Niche kein aggressives Aufschlagen).', kind: 'mechanical', delta: null },
        alternatives: [
          { description: 'Mahlgrad +0.5 zur Probe', kind: 'grind', delta: 0.5 },
        ],
        beanAgeNote,
      };
    }

    // 3b. Dark sweet spot — distinct from generic balanced, calls it out
    if (fr.chocolate >= 4 && fr.sweet >= 3 && fr.bitter < 3) {
      return {
        diagnosis: 'Schokolade präsent, Süße da, Bitterkeit unter Kontrolle — typischer Sweet Spot für dunkle Röstung. Referenz-Shot.',
        primary: { description: 'Keine Änderung — als Best-Shot speichern.', kind: 'none', delta: null },
        alternatives: [],
        beanAgeNote,
      };
    }

    // 3c. Generally balanced
    if (fr.sweet >= 4 && fr.finish >= 3 && fr.body >= 3) {
      return {
        diagnosis: 'Süße ausgeprägt, Abgang trägt, Körper stimmt — balanciert.',
        primary: { description: 'Keine Änderung — als Best-Shot-Kandidat speichern.', kind: 'none', delta: null },
        alternatives: [],
        beanAgeNote,
      };
    }

    // 3d. Heavy/dull — body high, finish weak, sweet weak
    if (fr.body >= 4 && fr.sweet < 3 && fr.finish < 2) {
      return {
        diagnosis: 'Hoher Körper aber kein Abgang und wenig Süße — schwer/dumpf, das Aroma ertrinkt im Körper.',
        primary: { description: 'Ratio +0.2 (mehr Wasser, öffnet das Aroma)', kind: 'ratio', delta: 0.2 },
        alternatives: [
          { description: 'Dose −0.5g (lockerer Puck)', kind: 'dose', delta: -0.5 },
          { description: 'Mahlgrad +0.5 (weniger gelöste Substanz)', kind: 'grind', delta: 0.5 },
        ],
        beanAgeNote,
      };
    }

    // 3e. Sharp positive acidity without sweetness → underextracted
    if (fr.acidity >= 4 && fr.sweet < 3 && fr.sourDefect < 3) {
      return {
        diagnosis: 'Helle/spritzige Säure präsent aber keine Süße als Gegengewicht — meist unterextrahiert. Echte Säure (Zitrus, Fruchtnoten) ist OK, aber sie braucht Süße um zu tragen.',
        primary: { description: `Mahlgrad ${farOff ? '−1.0' : '−0.5'} (feiner)`, kind: 'grind', delta: farOff ? -1.0 : -0.5 },
        alternatives: [
          { description: 'Temperatur +1°C', kind: 'temp', delta: 1 },
          { description: 'Ratio +0.1', kind: 'ratio', delta: 0.1 },
        ],
        beanAgeNote,
      };
    }

    // 3f. Bitter with short/dry finish → overextracted
    if (fr.bitter >= 3 && fr.finish < 2) {
      return {
        diagnosis: 'Bitterkeit mit trockenem/kurzem Abgang — überextrahiert. Bitter dominiert, Süße kann nicht halten.',
        primary: { description: `Mahlgrad ${farOff ? '+1.0' : '+0.5'} (gröber)`, kind: 'grind', delta: farOff ? 1.0 : 0.5 },
        alternatives: [
          { description: 'Temperatur −1°C', kind: 'temp', delta: -1 },
          { description: 'Ratio −0.2 (früher abbrechen)', kind: 'ratio', delta: -0.2 },
        ],
        beanAgeNote,
      };
    }

    // 3g. Fad — nothing wrong, nothing right
    if (fr.sweet < 2 && fr.bitter < 3 && fr.sourDefect < 2 && fr.acidity < 3) {
      return {
        diagnosis: 'Nichts schmeckt falsch, aber auch nichts richtig — fad/langweilig. Häufige Ursachen: zu lange Ratio (verdünnt), alte Bohne, oder leichte Unterextraktion ohne Säure-Spitze.',
        primary: { description: 'Ratio −0.2 (konzentrierter)', kind: 'ratio', delta: -0.2 },
        alternatives: [
          { description: 'Mahlgrad −0.5 (mehr Extraktion)', kind: 'grind', delta: -0.5 },
          { description: 'Bohnen-Alter prüfen — falls >30 Tage post-roast, ggf. andere Bohne testen', kind: 'mechanical', delta: null },
        ],
        beanAgeNote,
      };
    }

    // Falls through to quickTag switch if no fullRating rule matched
  }

  // Step 4: Quick-tag based diagnosis
  switch (tag) {
    case 'sour':
      return {
        diagnosis: 'Unterextrahiert — Wasser hat nicht genug aus der Bohne gelöst. Säure dominiert ohne Süße/Tiefe.',
        primary: { description: `Mahlgrad ${farOff ? '−1.0' : '−0.5'} (feiner)`, kind: 'grind', delta: farOff ? -1.0 : -0.5 },
        alternatives: [
          { description: 'Temperatur +1°C', kind: 'temp', delta: 1 },
          { description: 'Ratio +0.2 (länger laufen lassen)', kind: 'ratio', delta: 0.2 },
        ],
        beanAgeNote,
      };

    case 'bitter':
      return {
        diagnosis: 'Überextrahiert — zu viel aus der Bohne gelöst, harsh / trocken.',
        primary: { description: `Mahlgrad ${farOff ? '+1.0' : '+0.5'} (gröber)`, kind: 'grind', delta: farOff ? 1.0 : 0.5 },
        alternatives: [
          { description: 'Temperatur −1°C', kind: 'temp', delta: -1 },
          { description: 'Ratio −0.2 (früher abbrechen)', kind: 'ratio', delta: -0.2 },
        ],
        beanAgeNote,
      };

    case 'flat': {
      const allInTarget = zoneOfValue(brew.timeS, target.time) === 'green' &&
                          zoneOfValue(ratio, target.ratio) === 'green' &&
                          zoneOfValue(brew.tempC, target.temp) === 'green';
      if (allInTarget) {
        return {
          diagnosis: 'Recipe im Target, aber Substanz fehlt. Mehrdeutig ohne TDS-Messung — mögliche Ursachen: Bohnenalter, Ratio-Präferenz, oder leichte Unterextraktion. Mit klarer Diagnose hält sich das Tool zurück.',
          primary: { description: 'Ratio −0.2 (höhere Konzentration)', kind: 'ratio', delta: -0.2 },
          alternatives: [
            { description: 'Mahlgrad −0.5', kind: 'grind', delta: -0.5 },
            { description: 'Dose +0.5g', kind: 'dose', delta: 0.5 },
          ],
          beanAgeNote,
        };
      }
      return {
        diagnosis: 'Flach/dünn — zu wenig Substanz. Recipe noch nicht im Target.',
        primary: { description: 'Ratio −0.2', kind: 'ratio', delta: -0.2 },
        alternatives: [
          { description: `Mahlgrad ${farOff ? '−1.0' : '−0.5'}`, kind: 'grind', delta: farOff ? -1.0 : -0.5 },
          { description: 'Dose +0.5g', kind: 'dose', delta: 0.5 },
        ],
        beanAgeNote,
      };
    }

    case 'heavy-dull':
      return {
        diagnosis: 'Zu konzentriert — belegt die Zunge, schwer/dicht statt klar. Typisches Phänomen bei dunklen Röstungen mit konischer Mühle (Niche) und kurzer Ratio: viel Körper, wenig Klarheit.',
        primary: { description: 'Ratio +0.2 (mehr Wasser im Yield, öffnet das Aroma ohne Charakter zu verlieren)', kind: 'ratio', delta: 0.2 },
        alternatives: [
          { description: 'Dose −0.5g (etwas lockerer Puck)', kind: 'dose', delta: -0.5 },
          { description: 'Mahlgrad +0.5 (gröber, weniger gelöste Substanz)', kind: 'grind', delta: 0.5 },
        ],
        beanAgeNote,
      };

    case 'ashy-dry':
      return {
        diagnosis: 'Aschige, trockene Bitterkeit — verbrannte Röststoffe werden gelöst. Distinkt von normaler Überextraktion (die eher kratzig/scharf wirkt).',
        primary: { description: 'Temperatur −1°C (weniger Lösung der hitzeempfindlichen Bitterstoffe)', kind: 'temp', delta: -1 },
        alternatives: [
          { description: 'Ratio −0.1 (etwas kürzer abbrechen)', kind: 'ratio', delta: -0.1 },
          { description: 'Mahlgrad +0.5 leicht gröber', kind: 'grind', delta: 0.5 },
        ],
        beanAgeNote,
      };

    case 'fad-boring':
      return {
        diagnosis: 'Fad/langweilig — keine Süße, keine Peaks, kein Charakter. Anders als flach/dünn (Körper-Problem): hier fehlt die Spannung im Aroma.',
        primary: { description: 'Ratio −0.2 (konzentrierter, weniger Verdünnung)', kind: 'ratio', delta: -0.2 },
        alternatives: [
          { description: 'Mahlgrad −0.5 (mehr Extraktion)', kind: 'grind', delta: -0.5 },
          { description: 'Bohnen-Alter prüfen — bei >30 Tagen ggf. neue Bohne probieren', kind: 'mechanical', delta: null },
        ],
        beanAgeNote,
      };

    case 'balanced':
      return {
        diagnosis: 'Im Sweet Spot. Keine Anpassung nötig — als Referenz für diese Bohne speichern.',
        primary: { description: 'Keine Änderung — Best-Shot-Kandidat.', kind: 'none', delta: null },
        alternatives: [],
        beanAgeNote,
      };

    default:
      // No tag set — recipe-only
      return {
        diagnosis: 'Kein Geschmacks-Tag gesetzt. Diagnose nur recipe-seitig möglich.',
        primary: { description: 'Geschmacks-Tag setzen für vollständige Diagnose.', kind: 'none', delta: null },
        alternatives: [],
        beanAgeNote,
      };
  }
}

// =============================================================================
// LLM PROMPT BUILDERS
// =============================================================================

function buildAnalysisContext(brew, bean, beanBrews) {
  const target = TARGETS[bean.roastLevel];
  const beanAge = daysSince(bean.roastDate);
  const currentRatio = brew.doseG > 0 && brew.yieldG > 0 ? (brew.yieldG / brew.doseG).toFixed(2) : '?';

  const lines = [];
  lines.push(`BOHNE: ${bean.roaster} — ${bean.name}`);
  if (bean.country) lines.push(`  Herkunft: ${bean.country}`);
  lines.push(`  Aufbereitung: ${bean.process}, Röstgrad: ${bean.roastLevel}${beanAge != null ? `, ${beanAge} Tage seit Röstung` : ''}`);
  if (bean.notes) lines.push(`  Bohnen-Notiz: ${bean.notes}`);
  lines.push('');
  lines.push(`TARGET (Röstgrad ${bean.roastLevel}): Ratio 1:${target.ratio.green[0]}–1:${target.ratio.green[1]}, Zeit ${target.time.green[0]}–${target.time.green[1]}s, Temp ${target.temp.green[0]}–${target.temp.green[1]}°C`);
  lines.push('');
  if (beanBrews.length === 0) {
    lines.push(`HISTORIE: keine vorherigen Shots dieser Bohne — nur generelle Espresso-Logik anwenden, keine bohnenspezifischen Aussagen.`);
  } else {
    lines.push(`HISTORIE (${beanBrews.length} ältere Shots, älteste zuerst):`);
    beanBrews.forEach((b, i) => {
      const r = b.doseG > 0 && b.yieldG > 0 ? (b.yieldG / b.doseG).toFixed(2) : '?';
      const obs = [b.channeling && 'Channeling', b.gusher && 'Gusher', b.choke && 'Choke'].filter(Boolean);
      const parts = [`${b.doseG}g→${b.yieldG}g (1:${r})`, `${b.timeS}s`, `${b.tempC}°C`, `Mahlgrad ${b.grindNiche}`, `${b.rating}/5★`];
      if (b.quickTag) parts.push(`Tag:${b.quickTag}`);
      if (obs.length) parts.push(`Obs:${obs.join('+')}`);
      if (b.notes) parts.push(`Notiz:"${b.notes}"`);
      lines.push(`  ${i + 1}. ${parts.join(', ')}`);
    });
  }
  lines.push('');
  lines.push('AKTUELLER SHOT:');
  const curObs = [brew.channeling && 'Channeling', brew.gusher && 'Gusher', brew.choke && 'Choke'].filter(Boolean);
  lines.push(`  ${brew.doseG}g→${brew.yieldG}g (Ratio 1:${currentRatio}), ${brew.timeS}s, ${brew.tempC}°C, Mahlgrad ${brew.grindNiche}, Sieb ${brew.basket}`);
  lines.push(`  Bewertung: ${brew.rating}/5★${brew.quickTag ? `, Tag: ${brew.quickTag}` : ''}${curObs.length ? `, Beobachtung: ${curObs.join('+')}` : ''}`);
  if (brew.fullRating) {
    const fr = brew.fullRating;
    const frParts = [];
    if (fr.acidity) frParts.push(`Säure+:${fr.acidity}`);
    if (fr.sourDefect) frParts.push(`Sauer-Defekt:${fr.sourDefect}`);
    if (fr.bitter) frParts.push(`Bitter:${fr.bitter}`);
    if (fr.sweet) frParts.push(`Süße:${fr.sweet}`);
    if (fr.chocolate) frParts.push(`Schoko:${fr.chocolate}`);
    if (fr.body) frParts.push(`Body:${fr.body}`);
    if (fr.finish) frParts.push(`Abgang:${fr.finish}`);
    if (frParts.length) lines.push(`  Volle Bewertung (0-5): ${frParts.join(', ')}`);
  }
  if (brew.notes) lines.push(`  Shot-Notiz: "${brew.notes}"`);
  return lines.join('\n');
}

const ANALYSIS_RULES = `REGELN:
- <5 Shots Historie = nur generelle Espresso-Logik, KEINE "diese Bohne mag X"-Aussagen
- Mechanik (Channeling/Gusher/Choke) priorisieren — Recipe-Tuning erst danach
- Hebelhierarchie: Mahlgrad → Ratio → Temp → Dose
- Schritte: Mahlgrad ±0.5 oder ±1.0, Temp ±1°C, Ratio ±0.1 oder ±0.2, Dose ±0.5g
- Ohne TDS-Messung: bei Mehrdeutigkeit explizit so kennzeichnen
- Sprache: Deutsch, knapp`;

function buildArtifactPrompt(brew, bean, beanBrews, userQuestion) {
  const ctx = buildAnalysisContext(brew, bean, beanBrews);
  const userQuestionBlock = userQuestion && userQuestion.trim()
    ? `\n\nZUSATZFRAGE des Nutzers (zuerst beantworten): "${userQuestion.trim()}"`
    : '';
  return `Analysiere diesen Espresso-Shot. Gib EINE konkrete Anpassung als Empfehlung.

${ctx}${userQuestionBlock}

${ANALYSIS_RULES}

Antworte als JSON (nur das Objekt, kein Markdown, kein Text drumrum):
{"diagnosis":"1-2 Sätze","primary":{"description":"z.B. Mahlgrad −0.5","kind":"grind|temp|ratio|dose|mechanical|none","delta":-0.5},"alternatives":[{"description":"...","kind":"...","delta":null}],"reasoning":"max 3 Sätze","confidence":"high|medium|low","uncertainties":["..."]}`;
}

function buildChatPrompt(brew, bean, beanBrews, userQuestion) {
  const ctx = buildAnalysisContext(brew, bean, beanBrews);
  const userQuestionBlock = userQuestion && userQuestion.trim()
    ? `\n\nZusatzfrage von mir (zuerst beantworten): "${userQuestion.trim()}"`

${ctx}${userQuestionBlock}

${ANALYSIS_RULES}

Antworte in Prosa: 1. Diagnose (1-2 Sätze), 2. Empfehlung (konkrete Änderung), 3. Begründung, 4. Konfidenz (hoch/mittel/niedrig), 5. Unsicherheiten falls vorhanden.`;
}

const KEY_BEANS = 'coffee:beans:v1';
const KEY_BREWS = 'coffee:brews:v1';

function storageAvailable() {
  try {
    if (typeof localStorage === 'undefined') return false;
    const test = '__test__';
    localStorage.setItem(test, test);
    localStorage.removeItem(test);
    return true;
  } catch {
    return false;
  }
}

async function loadAll() {
  const result = { beans: [], brews: [], diag: { available: storageAvailable(), beansLoaded: 0, brewsLoaded: 0, errors: [] } };
  if (!result.diag.available) {
    result.diag.errors.push('localStorage ist nicht verfügbar');
    console.warn('[Storage] localStorage not available');
    return result;
  }
  try {
    const v = localStorage.getItem(KEY_BEANS);
    if (v) {
      result.beans = JSON.parse(v);
      result.diag.beansLoaded = result.beans.length;
    }
    console.log('[Storage] loaded beans:', result.diag.beansLoaded);
  } catch (e) {
    console.warn('[Storage] beans parse failed:', e?.message);
    result.diag.errors.push(`beans: ${e?.message}`);
  }
  try {
    const v = localStorage.getItem(KEY_BREWS);
    if (v) {
      result.brews = JSON.parse(v);
      result.diag.brewsLoaded = result.brews.length;
    }
    console.log('[Storage] loaded brews:', result.diag.brewsLoaded);
  } catch (e) {
    console.warn('[Storage] brews parse failed:', e?.message);
    result.diag.errors.push(`brews: ${e?.message}`);
  }
  return result;
}

async function saveBeans(beans) {
  if (!storageAvailable()) {
    return { ok: false, error: 'localStorage nicht verfügbar' };
  }
  try {
    localStorage.setItem(KEY_BEANS, JSON.stringify(beans));
    console.log('[Storage] saved beans:', beans.length);
    return { ok: true };
  } catch (e) {
    console.error('[Storage] save beans failed:', e);
    return { ok: false, error: e?.message || String(e) };
  }
}

async function saveBrews(brews) {
  if (!storageAvailable()) {
    return { ok: false, error: 'localStorage nicht verfügbar' };
  }
  try {
    localStorage.setItem(KEY_BREWS, JSON.stringify(brews));
    console.log('[Storage] saved brews:', brews.length);
    return { ok: true };
  } catch (e) {
    console.error('[Storage] save brews failed:', e);
    return { ok: false, error: e?.message || String(e) };
  }
}

async function testStorageRoundtrip() {
  if (!storageAvailable()) {
    return { ok: false, step: 'availability', error: 'localStorage nicht verfügbar' };
  }
  const testKey = 'coffee:storage-test';
  const testValue = `roundtrip-${Date.now()}`;
  try {
    localStorage.setItem(testKey, testValue);
    const read = localStorage.getItem(testKey);
    if (read !== testValue) {
      return { ok: false, step: 'verify', error: `Geschrieben: "${testValue}", gelesen: "${read}"` };
    }
    localStorage.removeItem(testKey);
    return { ok: true, value: testValue };
  } catch (e) {
    return { ok: false, step: 'exception', error: e?.message || String(e) };
  }
}

function NumericField({ label, unit, value, onChange, step = 1, decimals = 1, min = 0 }) {
  const display = value === '' || value == null ? '' : Number(value).toFixed(decimals);
  const adj = (delta) => {
    const cur = value === '' || value == null ? 0 : Number(value);
    const next = Math.max(min, +(cur + delta).toFixed(2));
    onChange(next);
  };
  return (
    <div className="numeric-field">
      <div className="numeric-label">{label} <span className="unit">{unit}</span></div>
      <div className="numeric-row">
        <button className="step-btn" onClick={() => adj(-step)} aria-label="minus">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <rect x="4" y="11" width="16" height="2.5" rx="1.25"/>
          </svg>
        </button>
        <input
          type="number"
          inputMode="decimal"
          step={step}
          value={value === '' || value == null ? '' : value}
          onChange={(e) => {
            const v = e.target.value;
            if (v === '') { onChange(''); return; }
            onChange(+v);
          }}
          onFocus={(e) => e.target.select()}
          className="numeric-input"
        />
        <button className="step-btn" onClick={() => adj(step)} aria-label="plus">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <rect x="4" y="11" width="16" height="2.5" rx="1.25"/>
            <rect x="10.75" y="4" width="2.5" height="16" rx="1.25"/>
          </svg>
        </button>
      </div>
    </div>
  );
}

function ReferenceBar({ label, value, ranges, formatValue }) {
  if (value == null || isNaN(value)) {
    return (
      <div className="ref-bar">
        <div className="ref-bar-header">
          <span>{label}</span>
          <span className="ref-bar-val muted">—</span>
        </div>
        <div className="ref-bar-track empty"></div>
      </div>
    );
  }
  const zone = zoneOfValue(value, ranges);
  const min = ranges.full[0];
  const max = ranges.full[1];
  const pctOf = (v) => Math.max(0, Math.min(100, ((v - min) / (max - min)) * 100));
  const greenStart = pctOf(ranges.green[0]);
  const greenWidth = pctOf(ranges.green[1]) - greenStart;
  const yellowLeftStart = pctOf(ranges.yellow[0]);
  const yellowLeftWidth = greenStart - yellowLeftStart;
  const yellowRightStart = greenStart + greenWidth;
  const yellowRightWidth = pctOf(ranges.yellow[1]) - yellowRightStart;
  const markerPos = pctOf(value);

  return (
    <div className="ref-bar">
      <div className="ref-bar-header">
        <span>{label}</span>
        <span className={`ref-bar-val zone-${zone}`}>{formatValue(value)}</span>
      </div>
      <div className="ref-bar-track">
        <div className="zone-yellow" style={{ left: `${yellowLeftStart}%`, width: `${yellowLeftWidth}%` }}></div>
        <div className="zone-green" style={{ left: `${greenStart}%`, width: `${greenWidth}%` }}></div>
        <div className="zone-yellow" style={{ left: `${yellowRightStart}%`, width: `${yellowRightWidth}%` }}></div>
        <div className={`marker zone-${zone}`} style={{ left: `${markerPos}%` }}></div>
      </div>
      <div className="ref-bar-labels">
        <span>{formatValue(ranges.green[0])}</span>
        <span>{formatValue(ranges.green[1])}</span>
      </div>
    </div>
  );
}

function StarRating({ value, onChange }) {
  return (
    <div className="stars">
      {[1, 2, 3, 4, 5].map((n) => (
        <button
          key={n}
          className={`star ${value >= n ? 'filled' : ''}`}
          onClick={() => onChange(value === n ? 0 : n)}
          aria-label={`${n} stars`}
        >
          ★
        </button>
      ))}
    </div>
  );
}

function Slider({ label, value, onChange }) {
  return (
    <div className="slider">
      <div className="slider-row">
        <span className="slider-label">{label}</span>
        <span className="slider-val">{value}</span>
      </div>
      <input
        type="range"
        min="0"
        max="5"
        step="1"
        value={value || 0}
        onChange={(e) => onChange(+e.target.value)}
      />
    </div>
  );
}

function Pill({ label, active, onClick }) {
  return (
    <button className={`pill ${active ? 'active' : ''}`} onClick={onClick}>
      {label}
    </button>
  );
}

function Checkbox({ label, checked, onChange }) {
  return (
    <button className={`checkbox-pill ${checked ? 'checked' : ''}`} onClick={() => onChange(!checked)}>
      <span className="cb-box">{checked ? '✓' : ''}</span>
      <span>{label}</span>
    </button>
  );
}

const emptyBrew = (selectedBeanId, basket) => ({
  id: null,
  beanId: selectedBeanId || null,
  date: null,
  basket: basket || 'lm-14',
  doseG: BASKETS.find(b => b.id === (basket || 'lm-14'))?.defaultDose || 14,
  yieldG: '',
  timeS: '',
  tempC: 93,
  grindNiche: 12,
  channeling: false,
  gusher: false,
  choke: false,
  rating: 0,
  quickTag: null,
  fullRating: null,
  notes: '',
});

function BrewView({ beans, brews, selectedBeanId, setSelectedBeanId, onSave, onShowSuggestion, lastSavedBrew, setLastSavedBrew, brewDraft, setBrewDraft, onAddBean }) {
  const [showFullRating, setShowFullRating] = useState(false);
  const [toast, setToast] = useState(null);

  const activeBeans = beans.filter(b => !b.archived);
  const selectedBean = beans.find(b => b.id === selectedBeanId);

  const target = selectedBean ? TARGETS[selectedBean.roastLevel] : null;
  const ratio = (brewDraft.doseG > 0 && brewDraft.yieldG !== '' && brewDraft.yieldG > 0)
    ? brewDraft.yieldG / brewDraft.doseG
    : null;

  const beanAge = selectedBean ? daysSince(selectedBean.roastDate) : null;

  const update = (patch) => setBrewDraft({ ...brewDraft, ...patch });

  const handleSave = () => {
    if (!selectedBeanId) { setToast('Bohne wählen'); return; }
    if (brewDraft.yieldG === '' || brewDraft.timeS === '') { setToast('Yield und Zeit eingeben'); return; }
    const saveDate = brewDraft.customDate
      ? new Date(brewDraft.customDate).toISOString()
      : new Date().toISOString();
    const saved = {
      ...brewDraft,
      id: uuid(),
      beanId: selectedBeanId,
      date: saveDate,
    };
    // Strip helper field before saving — customDate is form-only
    delete saved.customDate;
    onSave(saved);
    setLastSavedBrew(saved);
    setToast('Shot gespeichert');
    setTimeout(() => setToast(null), 2200);
  };

  const handleSuggest = () => {
    if (!lastSavedBrew || !selectedBean) return;
    onShowSuggestion(lastSavedBrew, selectedBean);
  };

  // Empty state — no beans yet
  if (activeBeans.length === 0) {
    return (
      <div className="empty-state">
        <h2>Noch keine Bohne</h2>
        <p>Lege zuerst eine Bohne in der Bibliothek an, um Shots zu loggen.</p>
        <button className="btn-primary" onClick={onAddBean}>+ Erste Bohne anlegen</button>
      </div>
    );
  }

  return (
    <div className="brew-view">
      {/* Bean selector */}
      <div className="card">
        <label className="field-label">Bohne</label>
        <select
          value={selectedBeanId || ''}
          onChange={(e) => setSelectedBeanId(e.target.value)}
          className="select"
        >
          {activeBeans.map(b => (
            <option key={b.id} value={b.id}>
              {b.roaster} — {b.name}
            </option>
          ))}
        </select>
        {selectedBean && (
          <div className="bean-meta">
            <span>{ROAST_LEVELS.find(r => r.id === selectedBean.roastLevel)?.label}</span>
            {beanAge != null && <span>{beanAge} Tage seit Röstung</span>}
          </div>
        )}
      </div>

      {/* Recipe */}
      <div className="card">
        <label className="field-label">Recipe</label>
        <div className="basket-row">
          <span className="muted">Sieb:</span>
          <select
            value={brewDraft.basket}
            onChange={(e) => {
              const newBasket = e.target.value;
              const def = BASKETS.find(b => b.id === newBasket)?.defaultDose;
              update({ basket: newBasket, doseG: def ?? brewDraft.doseG });
            }}
            className="select-inline"
          >
            {BASKETS.map(b => <option key={b.id} value={b.id}>{b.label}</option>)}
          </select>
        </div>
        <div className="numeric-grid">
          <NumericField label="Dose" unit="g" value={brewDraft.doseG} onChange={(v) => update({ doseG: v })} step={0.1} decimals={1} />
          <NumericField label="Yield" unit="g" value={brewDraft.yieldG} onChange={(v) => update({ yieldG: v })} step={0.5} decimals={1} />
          <NumericField label="Zeit" unit="s" value={brewDraft.timeS} onChange={(v) => update({ timeS: v })} step={1} decimals={0} />
          <NumericField label="Temp" unit="°C" value={brewDraft.tempC} onChange={(v) => update({ tempC: v })} step={0.5} decimals={1} min={80} />
          <NumericField label="Mahlgrad" unit="" value={brewDraft.grindNiche} onChange={(v) => update({ grindNiche: v })} step={0.5} decimals={1} />
        </div>
        {(() => {
          // Auto-yield suggestion: when dose set + bean known, suggest target-midpoint yield.
          // Skip if yield is already within green range (no nag).
          if (!selectedBean || !brewDraft.doseG || brewDraft.doseG <= 0) return null;
          const target = TARGETS[selectedBean.roastLevel];
          if (!target) return null;
          const ratioMid = (target.ratio.green[0] + target.ratio.green[1]) / 2;
          const suggestedYield = Math.round(brewDraft.doseG * ratioMid * 2) / 2; // round to 0.5
          const currentYield = parseFloat(brewDraft.yieldG);
          const inTarget = !isNaN(currentYield) && currentYield > 0
            && (currentYield / brewDraft.doseG) >= target.ratio.green[0]
            && (currentYield / brewDraft.doseG) <= target.ratio.green[1];
          if (inTarget) return null;
          return (
            <button
              className="yield-suggestion"
              onClick={() => update({ yieldG: suggestedYield })}
              type="button"
            >
              ↦ Target-Mitte: <span className="mono">{suggestedYield}g</span> (1:{ratioMid.toFixed(2)})
            </button>
          );
        })()}
        {ratio != null && (
          <div className="ratio-display">
            Ratio: <span className="mono">1 : {ratio.toFixed(2)}</span>
          </div>
        )}
      </div>

      {/* Visual observations */}
      <div className="card">
        <label className="field-label">Beobachtung</label>
        <div className="checkbox-row">
          <Checkbox label="Channeling" checked={brewDraft.channeling} onChange={(v) => update({ channeling: v })} />
          <Checkbox label="Gusher" checked={brewDraft.gusher} onChange={(v) => update({ gusher: v })} />
          <Checkbox label="Choke" checked={brewDraft.choke} onChange={(v) => update({ choke: v })} />
        </div>
      </div>

      {/* Taste */}
      <div className="card">
        <label className="field-label">Geschmack</label>
        <StarRating value={brewDraft.rating} onChange={(v) => update({ rating: v })} />
        {(() => {
          // Smart hint: compute most-likely tag from recipe deviation. Doesn't auto-select — just hints.
          if (!selectedBean || brewDraft.quickTag) return null;
          const target = TARGETS[selectedBean.roastLevel];
          if (!target) return null;
          const time = parseFloat(brewDraft.timeS);
          const dose = parseFloat(brewDraft.doseG);
          const yld = parseFloat(brewDraft.yieldG);
          if (brewDraft.channeling || brewDraft.gusher) {
            return <div className="tag-hint">Vermutung: <em>sauer + bitter</em> (Channeling-Verdacht, falls Geschmack das bestätigt)</div>;
          }
          if (!isNaN(time) && time > 0 && time < target.time.green[0] - 3) {
            return <div className="tag-hint">Vermutung: <em>sauer</em> (Zeit deutlich unter Target → unterextrahiert)</div>;
          }
          if (!isNaN(time) && time > target.time.green[1] + 3) {
            return <div className="tag-hint">Vermutung: <em>bitter</em> (Zeit deutlich über Target → überextrahiert)</div>;
          }
          if (!isNaN(yld) && !isNaN(dose) && dose > 0 && yld > 0) {
            const r = yld / dose;
            if (r > target.ratio.green[1] + 0.15) {
              return <div className="tag-hint">Vermutung: <em>fad/langweilig</em> oder <em>flach/dünn</em> (Ratio über Target → verdünnt)</div>;
            }
            if (r < target.ratio.green[0] - 0.1) {
              return <div className="tag-hint">Vermutung: <em>schwer/dumpf</em> (Ratio unter Target → zu konzentriert)</div>;
            }
          }
          return null;
        })()}
        <div className="pill-row pill-row-wrap">
          {QUICK_TAGS.map(t => (
            <Pill key={t.id} label={t.label} active={brewDraft.quickTag === t.id} onClick={() => update({ quickTag: brewDraft.quickTag === t.id ? null : t.id })} />
          ))}
        </div>
        <button className="link-btn" onClick={() => setShowFullRating(!showFullRating)}>
          {showFullRating ? '▾ Volle Bewertung einklappen' : '▸ Volle Bewertung erweitern'}
        </button>
        {showFullRating && (
          <div className="full-rating">
            {[
              { key: 'acidity', label: 'Säure (positiv)' },
              { key: 'sourDefect', label: 'Sauer (Defekt)' },
              { key: 'bitter', label: 'Bitter' },
              { key: 'sweet', label: 'Süße' },
              { key: 'chocolate', label: 'Schokoladigkeit' },
              { key: 'body', label: 'Body' },
              { key: 'finish', label: 'Abgang' },
            ].map(({ key, label }) => (
              <Slider
                key={key}
                label={label}
                value={(brewDraft.fullRating || {})[key] || 0}
                onChange={(v) => update({ fullRating: { ...(brewDraft.fullRating || {}), [key]: v } })}
              />
            ))}
          </div>
        )}
      </div>

      {/* Visualization */}
      {target && (
        <div className="card">
          <label className="field-label">Vergleich zu Target ({ROAST_LEVELS.find(r => r.id === selectedBean.roastLevel)?.label})</label>
          <ReferenceBar
            label="Ratio"
            value={ratio}
            ranges={target.ratio}
            formatValue={(v) => `1:${v.toFixed(2)}`}
          />
          <ReferenceBar
            label="Zeit"
            value={brewDraft.timeS === '' ? null : brewDraft.timeS}
            ranges={target.time}
            formatValue={(v) => `${v.toFixed(0)}s`}
          />
          <ReferenceBar
            label="Temperatur"
            value={brewDraft.tempC === '' ? null : brewDraft.tempC}
            ranges={target.temp}
            formatValue={(v) => `${v.toFixed(1)}°C`}
          />
        </div>
      )}

      {/* Notes */}
      <div className="card">
        <label className="field-label">Notizen</label>
        <textarea
          value={brewDraft.notes}
          onChange={(e) => update({ notes: e.target.value })}
          rows={2}
          placeholder="optional"
          className="textarea"
        />
      </div>

      {/* Nachträglich loggen */}
      <div className="card">
        <Checkbox
          label="Nachträglich loggen (Datum + Uhrzeit setzen)"
          checked={!!brewDraft.customDate}
          onChange={(checked) => {
            if (checked) {
              // Initialize with current date+time in local format for datetime-local input
              const now = new Date();
              const pad = (n) => String(n).padStart(2, '0');
              const iso = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
              update({ customDate: iso });
            } else {
              update({ customDate: null });
            }
          }}
        />
        {brewDraft.customDate && (
          <input
            type="datetime-local"
            className="text-input"
            style={{ marginTop: 8 }}
            value={brewDraft.customDate}
            onChange={(e) => update({ customDate: e.target.value })}
          />
        )}
      </div>

      {toast && <div className="toast">{toast}</div>}

      {/* Sticky save */}
      <div className="sticky-actions">
        <button className="btn-primary" onClick={handleSave}>Speichern</button>
        {lastSavedBrew && lastSavedBrew.beanId === selectedBeanId && (
          <button className="btn-secondary" onClick={handleSuggest}>Was nächstes?</button>
        )}
      </div>
    </div>
  );
}

    return (
      <button className="btn-primary" onClick={() => onApply(action)}>
        Anwenden & neuer Shot
      </button>
    );
  };

  const requestLlmAnalysis = async () => {
    setLlmState('loading');
    setLlmError(null);
    try {
      const beanBrews = brews
        .filter(b => b.beanId === bean.id && b.id !== brew.id)
        .sort((a, b) => new Date(a.date) - new Date(b.date))
        .slice(-10);

      const prompt = buildArtifactPrompt(brew, bean, beanBrews, llmQuestion);

      // window.claude.complete only exists inside Claude.ai artifact sandbox.
      // In the standalone PWA, the chat-prompt-copy workaround is the only path.
      if (typeof window === 'undefined' || !window.claude || typeof window.claude.complete !== 'function') {
        throw new Error('In-App-KI ist in der Standalone-App nicht verfügbar (window.claude.complete existiert nur im Claude-Artefakt). Nutze den "Analyse-Prompt für Chat erzeugen"-Button.');
      }

      // Defensive wrapper: never lets the underlying call reject — wraps everything in {ok, text|error}.
      // This is meant to prevent the artifact runtime from showing its own "Error in Claude completion" dialog.
      const safeComplete = (p) => new Promise((resolve) => {
        try {
          const ret = window.claude.complete(p);
          if (ret && typeof ret.then === 'function') {
            ret.then(
              (v) => resolve({ ok: true, value: v }),
              (e) => resolve({ ok: false, error: e?.message || String(e), name: e?.name || 'Error' })
            );
          } else {
            // sync return — unusual but handle
            resolve({ ok: true, value: ret });
          }
        } catch (syncErr) {
          resolve({ ok: false, error: syncErr?.message || String(syncErr), name: syncErr?.name || 'Error' });
        }
      });

      const callResult = await safeComplete(prompt);
      if (!callResult.ok) {
        throw new Error(`window.claude.complete schlägt fehl (${callResult.name}): ${callResult.error}\n\nFalls dies wiederholt auftritt, nutze den "Im Chat analysieren"-Button unten.`);
      }

      let text = callResult.value;
      console.log('[LLM] Raw text:', text);

      if (typeof text !== 'string') {
        throw new Error(`Unerwarteter Rückgabetyp ${typeof text}: ${JSON.stringify(text).slice(0, 300)}`);
      }
      text = text.trim();
      if (!text) {
        throw new Error('Leere Antwort vom Modell.');
      }

      // Robust JSON extraction
      let clean = text.replace(/```[a-zA-Z]*\s*/g, '').replace(/```/g, '').trim();
      if (!clean.startsWith('{')) {
        const firstBrace = clean.indexOf('{');
        const lastBrace = clean.lastIndexOf('}');
        if (firstBrace >= 0 && lastBrace > firstBrace) {
          clean = clean.slice(firstBrace, lastBrace + 1);
        }
      }
      // Strip trailing commas before } or ] which would break JSON.parse
      clean = clean.replace(/,(\s*[}\]])/g, '$1');

      let parsed = null;
      try {
        parsed = JSON.parse(clean);
      } catch (parseErr) {
        console.warn('[LLM] JSON parse failed, falling back to plain-text mode:', parseErr.message);
      }

      // Validate parsed shape; if anything is missing/invalid, fall back to plain-text
      const isValid = parsed
        && typeof parsed === 'object'
        && parsed.primary
        && typeof parsed.primary.description === 'string';

      if (isValid) {
        setLlmResult(parsed);
      } else {
        // Fallback: show the model's raw text as the diagnosis, no Apply button
        setLlmResult({
          diagnosis: text,
          primary: null,
          alternatives: [],
          reasoning: null,
          confidence: null,
          uncertainties: [],
          isFallback: true,
        });
      }
      setLlmState('success');
    } catch (err) {
      console.error('[LLM] analysis failed:', err);
      setLlmError(err.message || 'unbekannter Fehler');
      setLlmState('error');
    }
  };

  const runApiTest = async () => {
    setTestResult('testing');
    try {
      if (typeof window === 'undefined' || !window.claude || typeof window.claude.complete !== 'function') {
        setTestResult(`window.claude.complete ist nicht definiert.\n\ntypeof window: ${typeof window}\ntypeof window.claude: ${typeof window?.claude}\ntypeof window.claude?.complete: ${typeof window?.claude?.complete}`);
        return;
      }
      const t0 = Date.now();
      const resp = await window.claude.complete('Antworte nur mit dem Wort: OK');
      const ms = Date.now() - t0;
      console.log('[API-Test] Response:', resp);
      setTestResult(`✓ Erfolg in ${ms}ms.\n\nRückgabetyp: ${typeof resp}\nLänge: ${typeof resp === 'string' ? resp.length : '?'}\n\nInhalt:\n${typeof resp === 'string' ? resp.slice(0, 400) : JSON.stringify(resp).slice(0, 400)}`);
    } catch (err) {
      console.error('[API-Test] threw:', err);
      setTestResult(`✗ window.claude.complete warf: ${err.name || 'Error'} — ${err.message || String(err)}`);
    }
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <div className="modal-header">
          <h3>Vorschlag</h3>
          <button className="close-btn" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          {/* Rule-based primary */}
          <div className="suggestion-source">Regelbasiert</div>
          <div className="diagnosis">{ruleResult.diagnosis}</div>
          {ruleResult.beanAgeNote && (
            <div className="bean-age-note">{ruleResult.beanAgeNote}</div>
          )}
          <div className="primary-suggestion">
            <div className="suggestion-label">Empfehlung</div>
            <div className="suggestion-text">{ruleResult.primary.description}</div>
            {renderAction(ruleResult.primary)}
          </div>
          {ruleResult.alternatives.length > 0 && (
            <>
              <button className="link-btn" onClick={() => setShowAlts(!showAlts)}>
                {showAlts ? '▾ Alternativen einklappen' : '▸ Alternativen anzeigen'}
              </button>
              {showAlts && (
                <div className="alternatives">
                  {ruleResult.alternatives.map((alt, i) => (
                    <div key={i} className="alt-item">
                      <div className="suggestion-text">{alt.description}</div>
                      {renderAction(alt)}
                    </div>
                  ))}
                </div>
              )}
            </>
          )}

          {/* LLM deep analysis */}
          <div className="llm-section">
            <div className="suggestion-source">Tiefenanalyse mit Bohnenhistorie</div>
            {showChatPrompt ? (
              <ChatPromptView
                prompt={buildChatPrompt(brew, bean, buildBeanBrewsForPrompt(), llmQuestion)}
                onBack={() => setShowChatPrompt(false)}
              />
            ) : (
              <>
            {llmState === 'idle' && (
              <>
                <div className="llm-section-hint">Bezieht Bohnenhistorie ({brews.filter(b => b.beanId === bean.id).length} Shots), Notizen und volle Bewertungen ein. Antwort kommt im Claude-Chat — du gibst die Empfehlung manuell hier ein.</div>
                <textarea
                  className="textarea"
                  rows={2}
                  placeholder="Optional: Zusatzfrage stellen, z.B. 'Warum schmeckt diese Bohne immer kreidig?'"
                  value={llmQuestion}
                  onChange={(e) => setLlmQuestion(e.target.value)}
                  style={{ marginBottom: 10 }}
                />
                <button className="btn-primary" onClick={() => setShowChatPrompt(true)} style={{ width: '100%' }}>
                  Analyse-Prompt für Chat erzeugen
                </button>
                <button className="link-btn" onClick={requestLlmAnalysis} style={{ display: 'block', marginTop: 10, textAlign: 'center', width: '100%' }}>
                  In-App-KI versuchen (experimentell, crasht auf iOS)
                </button>
              </>
            )}
            {llmState === 'loading' && (
              <div className="llm-loading">
                <div className="spinner"></div>
                <span>Analysiere {brews.filter(b => b.beanId === bean.id).length} Shots dieser Bohne …</span>
              </div>
            )}
            {llmState === 'error' && (
              <div className="llm-error">
                Analyse fehlgeschlagen: {llmError}
                <button className="link-btn" onClick={requestLlmAnalysis} style={{ display: 'block', marginTop: 10 }}>Nochmal versuchen</button>
                <button className="link-btn" onClick={() => setShowChatPrompt(true)} style={{ display: 'block', marginTop: 4 }}>
                  → Workaround: Im Claude-Chat analysieren
                </button>
                <button className="link-btn" onClick={runApiTest} style={{ display: 'block', marginTop: 4 }}>
                  {testResult === 'testing' ? 'Teste API …' : 'Minimal-API-Test ausführen (Diagnose)'}
                </button>
                {testResult && testResult !== 'testing' && (
                  <div style={{ marginTop: 10, padding: 10, background: 'rgba(0,0,0,0.04)', borderRadius: 6, fontSize: 12, fontFamily: 'IBM Plex Mono, monospace', whiteSpace: 'pre-wrap', wordBreak: 'break-word', maxHeight: 240, overflowY: 'auto', color: 'var(--text)' }}>
                    {testResult}
                  </div>
                )}
              </div>
            )}
            {llmState === 'success' && llmResult && (
              <>
                <div className="diagnosis" style={{ whiteSpace: 'pre-wrap' }}>{llmResult.diagnosis}</div>
                {llmResult.isFallback && (
                  <div className="bean-age-note">
                    Hinweis: Antwort kam nicht in striktem JSON-Format zurück — zeige Roh-Analyse. Kein "Anwenden"-Button verfügbar.
                  </div>
                )}
                {llmResult.primary && (
                  <div className="primary-suggestion">
                    <div className="suggestion-label">
                      Empfehlung
                      {llmResult.confidence && (
                        <span className={`confidence-badge confidence-${llmResult.confidence}`}>
                          {llmResult.confidence === 'high' ? 'hoch' : llmResult.confidence === 'medium' ? 'mittel' : 'niedrig'}
                        </span>
                      )}
                    </div>
                    <div className="suggestion-text">{llmResult.primary.description}</div>
                    {renderAction(llmResult.primary)}
                  </div>
                )}
                {llmResult.reasoning && (
                  <div className="llm-reasoning">{llmResult.reasoning}</div>
                )}
                {llmResult.uncertainties && llmResult.uncertainties.length > 0 && (
                  <div className="llm-uncertainties">
                    <div className="suggestion-label">Unsicherheiten</div>
                    <ul>
                      {llmResult.uncertainties.map((u, i) => <li key={i}>{u}</li>)}
                    </ul>
                  </div>
                )}
                {llmResult.alternatives && llmResult.alternatives.length > 0 && (
                  <>
                    <button className="link-btn" onClick={() => setShowLlmAlts(!showLlmAlts)}>
                      {showLlmAlts ? '▾ Alternativen einklappen' : '▸ Alternativen anzeigen'}
                    </button>
                    {showLlmAlts && (
                      <div className="alternatives">
                        {llmResult.alternatives.map((alt, i) => (
                          <div key={i} className="alt-item">
                            <div className="suggestion-text">{alt.description}</div>
                            {renderAction(alt)}
                          </div>
                        ))}
                      </div>
                    )}
                  </>
                )}
                <button className="link-btn" onClick={() => { setLlmState('idle'); setLlmResult(null); setLlmQuestion(''); setShowLlmAlts(false); }} style={{ display: 'block', marginTop: 12 }}>
                  ↻ Neue Analyse / andere Frage
                </button>
              </>
            )}
              </>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

function LogView({ brews, beans, onSelectBrew, onRepeat }) {
  const [filterBean, setFilterBean] = useState('all');
  const [bestOnly, setBestOnly] = useState(false);
  const [showAll, setShowAll] = useState(false); // false = letzte 30 Tage, true = alle

  const cutoff = Date.now() - 30 * 24 * 60 * 60 * 1000;
  const filtered = brews
    .filter(b => showAll || (b.date && new Date(b.date).getTime() >= cutoff))
    .filter(b => filterBean === 'all' || b.beanId === filterBean)
    .filter(b => !bestOnly || b.rating >= 4)
    .sort((a, b) => new Date(b.date) - new Date(a.date));

  const totalOlder = brews.filter(b => b.date && new Date(b.date).getTime() < cutoff).length;

  return (
    <div className="log-view">
      <div className="card">
        <label className="field-label">Filter</label>
        <select value={filterBean} onChange={(e) => setFilterBean(e.target.value)} className="select">
          <option value="all">Alle Bohnen</option>
          {beans.map(b => <option key={b.id} value={b.id}>{b.roaster} — {b.name}</option>)}
        </select>
        <div style={{ marginTop: 8 }}>
          <Checkbox label="Nur Best Shots (4–5★)" checked={bestOnly} onChange={setBestOnly} />
        </div>
        <div style={{ marginTop: 8 }}>
          <Checkbox
            label={showAll ? 'Alle Shots zeigen' : `Letzte 30 Tage${totalOlder > 0 ? ` (${totalOlder} ältere ausgeblendet)` : ''}`}
            checked={showAll}
            onChange={setShowAll}
          />
        </div>
      </div>

      <div className="brew-list">
        {filtered.length === 0 && <div className="muted center">Keine Shots</div>}
        {filtered.map(brew => {
          const bean = beans.find(b => b.id === brew.beanId);
          const ratio = brew.doseG > 0 ? brew.yieldG / brew.doseG : null;
          return (
            <div key={brew.id} className="brew-row">
              <div className="brew-row-content" onClick={() => onSelectBrew(brew)}>
                <div className="brew-row-top">
                  <span className="brew-bean">{bean ? `${bean.roaster} — ${bean.name}` : '(Bohne entfernt)'}</span>
                  <span className="brew-rating">{'★'.repeat(brew.rating)}{'☆'.repeat(5 - brew.rating)}</span>
                </div>
                <div className="brew-row-meta mono">
                  <span>{formatDateTime(brew.date)}</span>
                  {ratio != null && <span>1:{ratio.toFixed(2)}</span>}
                  <span>{brew.timeS}s</span>
                  <span>{brew.tempC}°C</span>
                  <span>m{brew.grindNiche}</span>
                </div>
                {brew.quickTag && (
                <div className="brew-tag">{getQuickTagLabel(brew.quickTag)}</div>
              )}
              </div>
              {bean && !bean.archived && (
                <button
                  className="brew-row-repeat"
                  onClick={(e) => { e.stopPropagation(); onRepeat(brew); }}
                  title="Wiederholen — Werte in Brew-Form übernehmen"
                  type="button"
                >
                  ↻
                </button>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// =============================================================================
// TREND CHART (SVG) — used in bean detail
// =============================================================================

function BeanTrendChart({ brews, bean }) {
  const beanBrews = brews
    .filter(b => b.beanId === bean.id && b.doseG > 0 && b.yieldG > 0 && b.date)
    .sort((a, b) => new Date(a.date) - new Date(b.date));

  if (beanBrews.length < 2) {
    return <div className="muted" style={{ fontSize: 13, marginTop: 8 }}>Mindestens 2 Shots nötig für Trend</div>;
  }

  const target = TARGETS[bean.roastLevel];
  const ratios = beanBrews.map(b => b.yieldG / b.doseG);
  const ratings = beanBrews.map(b => b.rating || 0);

  // Y-range: include both data and target band; pad slightly
  const allValues = [...ratios, target.ratio.yellow[0], target.ratio.yellow[1]];
  const minY = Math.min(...allValues) - 0.05;
  const maxY = Math.max(...allValues) + 0.05;

  const width = 320;
  const height = 110;
  const padL = 6;
  const padR = 44;
  const padT = 8;
  const padB = 18;
  const plotW = width - padL - padR;
  const plotH = height - padT - padB;

  const xScale = (i) => padL + (beanBrews.length === 1 ? plotW / 2 : (i / (beanBrews.length - 1)) * plotW);
  const yScale = (v) => padT + plotH - ((v - minY) / (maxY - minY)) * plotH;

  // Zones
  const greenTop = yScale(target.ratio.green[1]);
  const greenBot = yScale(target.ratio.green[0]);
  const yelTop = yScale(target.ratio.yellow[1]);
  const yelBot = yScale(target.ratio.yellow[0]);

  // Line path
  const linePath = ratios.map((r, i) => `${i === 0 ? 'M' : 'L'} ${xScale(i).toFixed(1)} ${yScale(r).toFixed(1)}`).join(' ');

  // Rating → color mapping for dots
  const ratingColor = (r) => {
    if (r >= 4) return '#7a8f4d'; // green
    if (r >= 3) return '#c75a2c'; // accent
    if (r >= 1) return '#a85a3c'; // muted accent
    return '#999';
  };

  return (
    <div className="trend-chart-wrap">
      <svg viewBox={`0 0 ${width} ${height}`} className="trend-chart" preserveAspectRatio="xMidYMid meet">
        {/* Yellow zone */}
        <rect x={padL} y={yelTop} width={plotW} height={Math.max(0, yelBot - yelTop)} fill="rgba(214, 178, 92, 0.18)" />
        {/* Green zone */}
        <rect x={padL} y={greenTop} width={plotW} height={Math.max(0, greenBot - greenTop)} fill="rgba(122, 143, 77, 0.28)" />
        {/* Line */}
        <path d={linePath} fill="none" stroke="#5c4634" strokeWidth="1.5" />
        {/* Dots colored by rating */}
        {ratios.map((r, i) => (
          <circle key={i} cx={xScale(i)} cy={yScale(r)} r="4" fill={ratingColor(ratings[i])} stroke="#fff" strokeWidth="1" />
        ))}
        {/* Y-axis labels (right side) */}
        <text x={width - padR + 4} y={padT + 4} fontSize="9" fill="#8b7355">1:{maxY.toFixed(1)}</text>
        <text x={width - padR + 4} y={padT + plotH + 2} fontSize="9" fill="#8b7355">1:{minY.toFixed(1)}</text>
        <text x={width - padR + 4} y={greenTop + (greenBot - greenTop) / 2 + 3} fontSize="9" fill="#5a6a3a" fontWeight="500">Target</text>
        {/* X-axis label */}
        <text x={padL} y={height - 4} fontSize="9" fill="#8b7355">Shot 1</text>
        <text x={padL + plotW} y={height - 4} fontSize="9" fill="#8b7355" textAnchor="end">Shot {beanBrews.length}</text>
      </svg>
      <div className="trend-legend">
        Punkt-Farbe = Rating · Linie = Ratio über Zeit · Grünes Band = Target-Range
      </div>
    </div>
  );
}

  const q = searchQuery.trim().toLowerCase();

    .filter(b => showArchived ? b.archived : !b.archived)

            setEditingBean(null);
          }}
          onCancel={() => setEditingBean(null)}
          onArchive={editingBean.id ? () => { onArchive(editingBean); setEditingBean(null); } : null}
          onUnarchive={editingBean.id && editingBean.archived ? () => { onUnarchive(editingBean); setEditingBean(null); } : null}
          onDelete={editingBean.id ? () => {
            if (confirm('Bohne und alle zugehörigen Shots löschen?')) {
              onDelete(editingBean);
              setEditingBean(null);
            }
          } : null}
        />
      )}

      {dataIOMode === 'export' && (
        <ExportDataModal jsonStr={onExport()} onClose={() => setDataIOMode(null)} />
      )}
      {dataIOMode === 'import' && (
        <ImportDataModal
          onClose={() => setDataIOMode(null)}
          onImport={async (json) => { await onImport(json); setDataIOMode(null); }}
        />
      )}
    </div>
  );
}

function ExportDataModal({ jsonStr, onClose }) {
  const [copied, setCopied] = useState(false);
  const textareaRef = useRef(null);

  const handleCopy = async () => {
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(jsonStr);
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
        return;
      }
    } catch {}
    // Fallback: select textarea content for manual copy
    if (textareaRef.current) {
      textareaRef.current.select();
    }
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <div className="modal-header">
          <h3>Daten exportieren</h3>
          <button className="close-btn" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          <div className="data-io-hint" style={{ marginBottom: 12 }}>
            Kopiere den JSON-Text und speichere ihn extern (Notiz-App, Mail an dich selbst, etc.). Beim Import in eine neue Version fügst du diesen Text wieder ein.
          </div>
          <textarea
            ref={textareaRef}
            className="textarea mono"
            value={jsonStr}
            readOnly
            rows={12}
            onFocus={(e) => e.target.select()}
            style={{ fontSize: 12 }}
          />
          <div className="modal-actions">
            <button className="btn-primary" onClick={handleCopy}>{copied ? '✓ Kopiert' : 'In Zwischenablage'}</button>
            <button className="btn-secondary" onClick={onClose}>Schließen</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function ImportDataModal({ onClose, onImport }) {
  const [jsonText, setJsonText] = useState('');
  const [error, setError] = useState(null);
  const [loading, setLoading] = useState(false);

  const handleImport = async () => {
    setError(null);
    setLoading(true);
    try {
      await onImport(jsonText);
    } catch (err) {
      setError(err.message || 'Import fehlgeschlagen');
      setLoading(false);

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <div className="modal-header">
          <h3>Daten importieren</h3>
          <button className="close-btn" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          <div className="data-io-hint" style={{ marginBottom: 12 }}>
            Füge den zuvor exportierten JSON-Text ein. <strong>Achtung:</strong> ersetzt deine aktuellen Daten komplett.
          </div>
          <textarea
            className="textarea mono"
            placeholder='{"version":1,"beans":[...],"brews":[...]}'
            value={jsonText}
            onChange={(e) => setJsonText(e.target.value)}

    name: bean.name || '',

    archived: bean.archived || false,

function StatsView({ beans, brews }) {
  if (brews.length === 0) {
    return (
      <div className="stats-view">
        <div className="card">
          <div className="muted center">Noch keine Shots geloggt — Statistik erscheint sobald Daten da sind.</div>
        </div>
      </div>
    );
  }

  const activeBeans = beans.filter(b => !b.archived);
  const firstShotDate = new Date(Math.min(...brews.filter(b => b.date).map(b => new Date(b.date).getTime())));
  const daysTracking = Math.max(1, Math.round((Date.now() - firstShotDate.getTime()) / (1000 * 60 * 60 * 24)));

  // Rating distribution
  const ratingDist = [0, 0, 0, 0, 0, 0]; // index 0 = no rating, 1-5 = stars
  brews.forEach(b => { ratingDist[b.rating || 0]++; });
  const maxRatingCount = Math.max(...ratingDist);

  // Avg rating per roast level
  const roastStats = {};
  ROAST_LEVELS.forEach(rl => { roastStats[rl.id] = { count: 0, ratingSum: 0 }; });
  brews.forEach(b => {
    const bean = beans.find(bn => bn.id === b.beanId);
    if (!bean) return;
    if (roastStats[bean.roastLevel]) {
      roastStats[bean.roastLevel].count++;
      roastStats[bean.roastLevel].ratingSum += (b.rating || 0);
    }
  });

  // Tag frequency (normalized for legacy)
  const tagCounts = {};
  brews.forEach(b => {
    const t = normalizeQuickTag(b.quickTag);
    if (t) tagCounts[t] = (tagCounts[t] || 0) + 1;
  });
  const tagEntries = Object.entries(tagCounts).sort((a, b) => b[1] - a[1]);
  const maxTagCount = tagEntries.length ? tagEntries[0][1] : 0;

  // Best bean (highest avg rating, min 3 shots)
  const beanScores = activeBeans.map(bean => {
    const bs = brews.filter(b => b.beanId === bean.id && (b.rating || 0) > 0);
    return {
      bean,
      count: bs.length,
      avg: bs.length > 0 ? bs.reduce((s, b) => s + b.rating, 0) / bs.length : 0,
    };
  }).filter(x => x.count >= 3).sort((a, b) => b.avg - a.avg);
  const topBean = beanScores[0];

  // Shots per week, last 8 weeks
  const now = Date.now();
  const weekMs = 7 * 24 * 60 * 60 * 1000;
  const weeklyShots = Array.from({ length: 8 }, (_, i) => {
    const end = now - i * weekMs;
    const start = end - weekMs;
    return {
      label: i === 0 ? 'diese Wo.' : `vor ${i} Wo.`,
      count: brews.filter(b => {
        if (!b.date) return false;
        const t = new Date(b.date).getTime();
        return t >= start && t < end;
      }).length,
    };
  }).reverse();
  const maxWeekly = Math.max(...weeklyShots.map(w => w.count), 1);

  return (
    <div className="stats-view">
      {/* Overview */}
      <div className="card">
        <label className="field-label">Übersicht</label>
        <div className="stat-grid">
          <div className="stat-cell">
            <div className="stat-value">{brews.length}</div>
            <div className="stat-label">Shots gesamt</div>
          </div>
          <div className="stat-cell">
            <div className="stat-value">{activeBeans.length}</div>
            <div className="stat-label">Aktive Bohnen</div>
          </div>
          <div className="stat-cell">
            <div className="stat-value">{daysTracking}</div>
            <div className="stat-label">Tage geloggt</div>
          </div>
          <div className="stat-cell">
            <div className="stat-value">{(brews.length / daysTracking * 7).toFixed(1)}</div>
            <div className="stat-label">Shots / Woche ø</div>
          </div>
        </div>
      </div>

      {/* Weekly activity */}
      <div className="card">
        <label className="field-label">Aktivität (8 Wochen)</label>
        <div className="weekly-bars">
          {weeklyShots.map((w, i) => (
            <div key={i} className="weekly-bar-col">
              <div className="weekly-bar-fill" style={{ height: `${(w.count / maxWeekly) * 100}%` }}>
                {w.count > 0 && <span className="weekly-bar-num">{w.count}</span>}
              </div>
              <div className="weekly-bar-label">{w.label}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Rating distribution */}
      <div className="card">
        <label className="field-label">Rating-Verteilung</label>
        <div className="rating-bars">
          {[5, 4, 3, 2, 1].map(stars => (
            <div key={stars} className="rating-bar-row">
              <span className="rating-bar-label">{'★'.repeat(stars)}</span>
              <div className="rating-bar-track">
                <div className="rating-bar-fill" style={{ width: `${maxRatingCount > 0 ? (ratingDist[stars] / maxRatingCount) * 100 : 0}%` }} />
              </div>
              <span className="rating-bar-count mono">{ratingDist[stars]}</span>
            </div>
          ))}
          {ratingDist[0] > 0 && (
            <div className="rating-bar-row">
              <span className="rating-bar-label muted">—</span>
              <div className="rating-bar-track">
                <div className="rating-bar-fill" style={{ width: `${maxRatingCount > 0 ? (ratingDist[0] / maxRatingCount) * 100 : 0}%`, background: 'var(--text-muted)' }} />
              </div>
              <span className="rating-bar-count mono">{ratingDist[0]}</span>
            </div>
          )}
        </div>
      </div>

      {/* Tag frequency */}
      {tagEntries.length > 0 && (
        <div className="card">
          <label className="field-label">Geschmacks-Tags</label>
          <div className="tag-stats">
            {tagEntries.map(([tagId, count]) => {
              const label = QUICK_TAGS.find(t => t.id === tagId)?.label || tagId;
              return (
                <div key={tagId} className="rating-bar-row">
                  <span className="rating-bar-label" style={{ width: 100, fontSize: 13 }}>{label}</span>
                  <div className="rating-bar-track">
                    <div className="rating-bar-fill" style={{ width: `${(count / maxTagCount) * 100}%` }} />
                  </div>
                  <span className="rating-bar-count mono">{count}</span>
                </div>
              );
            })}
          </div>
          {tagEntries.length >= 3 && (
            <div className="muted" style={{ fontSize: 11, marginTop: 8 }}>
              Häufige Tags zeigen wiederkehrende Probleme — z.B. "sauer" oft → Target-Ranges evtl. zu warm/lang
            </div>
          )}
        </div>
      )}

      {/* Per roast level */}
      <div className="card">
        <label className="field-label">Rating pro Röstgrad</label>
        <div className="roast-stats">
          {ROAST_LEVELS.map(rl => {
            const s = roastStats[rl.id];
            if (s.count === 0) return null;
            const avg = s.ratingSum / s.count;
            return (
              <div key={rl.id} className="roast-stat-row">
                <span style={{ flex: 1, fontSize: 14 }}>{rl.label}</span>
                <span className="mono muted" style={{ fontSize: 12 }}>{s.count} Shots</span>
                <span className="mono" style={{ fontSize: 13, color: 'var(--accent)', minWidth: 36, textAlign: 'right' }}>ø {avg.toFixed(1)}★</span>
              </div>
            );
          })}
        </div>
      </div>

      {/* Top bean */}
      {topBean && (
        <div className="card">
          <label className="field-label">Beste Bohne (min. 3 Shots)</label>
          <div style={{ fontSize: 14 }}>
            <div><strong>{topBean.bean.name}</strong> <span className="muted">— {topBean.bean.roaster}</span></div>
            <div className="mono" style={{ fontSize: 13, color: 'var(--accent)', marginTop: 4 }}>
              ø {topBean.avg.toFixed(2)}★ aus {topBean.count} Shots
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
